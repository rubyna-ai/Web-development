<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form</title>
</head>

<body>
    <h1>HTML Form</h1>
    <form method="get">
    <form action="submit" method="post"></form>
        <label for="username">Username:</label>
        <input type="text" id="username" />
        <br>
        <label for="Password">Password:</label>
        <input type="password" id="password" />
        <br>
        <label for="Email">Email:</label>
        <input type="email" id="email" />
        <br>
        <p>Gender:</p>
        <input Type="radio" id="male" name="gender" value="MALE" />
        <label for="Male">Male</label>
        <br>
        <input Type="radio" id="female" name="gender" value="FEMALE" />
        <label for="Female">Female</label>
        <br>

        <label for="cars">choose a car:</label>
        <select name="cars" id="cars">
            <option value = ""disabled selected></option> Select Cars </option>
            <option value="volvo">volvo</option>
            <option value="saab">saab</option>
            <option value="audi">audi</option>
        </select>
        <br>
        <label for="fav_books"> Favorite Books: </label>
        <input type="checkbox" name="Book" value = "The Alchemist" id="The Alchemist">
        <label name="The Alchemist">The Alchemist</label>
        <br>
        <input type="checkbox"  name="Book" value = "The kite runner"> 
        <label name="The kite runner"> The kite runner</label>
        <br>
        <input type="checkbox"  name="Book" value = "Harry Potter"> 
        <label name="Harry Potter">Harry Potter</label>
        <br>

        <input type="submit" value="submit">
    </form>

</body>

</html>
