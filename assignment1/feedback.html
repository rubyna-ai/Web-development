<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Form</title>
</head>
<body>

  <h2>Feedback Form</h2>

  <form action="#" method="post">

    <h3>Basic Information</h3>

    <label for="fullname">Full Name:</label><br />
    <input type="text" id="fullname" name="fullname"
      placeholder="Enter your full name"
      required minlength="3" maxlength="100" /><br /><br />

    <label for="email">Email Address:</label><br />
    <input type="email" id="email" name="email"
      placeholder="Enter your email address"
      required /><br /><br />

    <h3>Rating</h3>

    <label><input type="radio" name="rating" value="very_satisfied" required /> Very Satisfied</label><br />
    <label><input type="radio" name="rating" value="satisfied" /> Satisfied</label><br />
    <label><input type="radio" name="rating" value="neutral" /> Neutral</label><br />
    <label><input type="radio" name="rating" value="unsatisfied" /> Unsatisfied</label><br /><br />

    <h3>Interests</h3>

    <label><input type="checkbox" name="interests" value="web_dev" /> Web Development</label><br />
    <label><input type="checkbox" name="interests" value="mobile_dev" /> Mobile Development</label><br />
    <label><input type="checkbox" name="interests" value="ai_ml" /> AI &amp; Machine Learning</label><br /><br />

    <h3>Country</h3>

    <label for="country">Select your country:</label><br />
    <select id="country" name="country" required>
      <option value="">-- Please select --</option>
      <option value="nepal">Nepal</option>
      <option value="india">India</option>
      <option value="usa">United States</option>
      <option value="uk">United Kingdom</option>
      <option value="australia">Australia</option>
    </select><br /><br />

    <h3>Your Feedback</h3>

    <label for="feedback">Write your feedback here:</label><br />
    <textarea id="feedback" name="feedback" rows="5" cols="40"
      placeholder="Write your feedback here"
      required minlength="10" maxlength="500"></textarea><br /><br />

    <input type="submit" value="Submit" />

  </form>

</body>
</html>
